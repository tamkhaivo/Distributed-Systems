services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    networks:
      - ds-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      - SERVER_HOST=server
    depends_on:
      - server
    networks:
      - ds-network

networks:
  ds-network:
    driver: bridge
